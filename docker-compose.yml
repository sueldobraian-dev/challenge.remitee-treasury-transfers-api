services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: treasury-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_Password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Your_Password123", "-Q", "SELECT 1", "-C"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    image: challenge-api
    container_name: treasury-api
    build:
      context: .
      dockerfile: src/Challenge.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=TreasuryLedger;User Id=sa;Password=Your_Password123;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy

volumes:
  sql_data:
